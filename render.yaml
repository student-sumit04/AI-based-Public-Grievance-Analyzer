services:
  - type: web
    name: ai-public-grievance-analyzer-api
    runtime: node
    buildCommand: npm ci
    startCommand: npm run start --workspace server
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
